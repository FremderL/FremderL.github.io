<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prioriza</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="icon" type="image/x-icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_FUNpkbm3tJHYt4I6WjtOtdizk-LcgPi0YA&s">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Prioriza</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title">Navegación</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#" onclick="mostrarHome(); cerrarMenu()">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="mostrarCrearLista(); cerrarMenu()">Crear Nueva Lista+</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <main id="contenido" class="mt-5">
        <header>
            <h1 id="cita">"Siempre parece imposible hasta que se hace" - Nelson Mandela.</h1>
            <div id="notificacion" class="alert" style="display: none;"></div>
            <hr>
        </header>

        <section id="crear-lista" style="display: none;">
            <form id="form-nueva-lista" onsubmit="event.preventDefault(); crearLista();">
                <label for="nombreLista">Nombre de la Asignatura:</label>
                <input type="text" id="nombreLista" required maxlength="20">
                <button type="submit" id="guardarLista" class="btn btn-primary">Crear Lista</button>
            </form>
        </section>

        <section id="listas">
            <h2>Listas:</h2>
            <hr>
            <div id="contenedorListas"></div>
        </section>

        <section id="tareas" style="display: none;">
            <h2 id="nombreListaActual"></h2>
            <button class="btn btn-secondary" onclick="mostrarCrearTarea()">Crear Nueva Tarea+</button>
            <div id="contenedorTareas"></div>
        </section>

        <section id="crear-tarea" style="display: none;">
            <form id="formularioTarea" onsubmit="event.preventDefault(); agregarTarea();">
                <label for="nuevaTarea">Nueva Tarea:</label>
                <input type="text" id="nuevaTarea" required maxlength="150">
                <label for="fechaEntrega">Fecha de Entrega:</label>
                <input type="date" id="fechaEntrega" required>
                <button type="submit" class="btn btn-primary">Agregar Tarea</button>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/main.js"></script>
</body>
</html>
